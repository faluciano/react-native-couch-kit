name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"

      # Trusted publishing (OIDC) requires a recent npm CLI (>= 11.5.1). The
      # runner's bundled npm may be older, so upgrade it before publishing.
      # The global npm prefix is root-owned on GitHub runners, so use sudo.
      - name: Ensure npm supports trusted publishing (OIDC)
        run: sudo npm install -g npm@latest

      - run: bun install

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "$PUBLISHED" | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            TAG="${NAME}@${VERSION}"
            DIR=$(echo "$NAME" | sed 's/@couch-kit\///')
            CHANGELOG="packages/${DIR}/CHANGELOG.md"

            # Extract version section from CHANGELOG
            if [ -f "$CHANGELOG" ]; then
              awk -v ver="$VERSION" '
                /^## / { if (found) exit; if ($2 == ver) { found=1; next } }
                found { print }
              ' "$CHANGELOG" > /tmp/release-notes.md
            fi

            # Fall back to minimal body if no changelog section found
            if [ ! -s /tmp/release-notes.md ]; then
              echo "Release ${TAG}" > /tmp/release-notes.md
            fi

            echo "Creating release: ${TAG}"
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes-file /tmp/release-notes.md \
              --verify-tag || echo "⚠️ Failed to create release for ${TAG}"

            rm -f /tmp/release-notes.md
          done

      - name: Enable auto-merge
        if: steps.changesets.outputs.pullRequestNumber
        run: gh pr merge ${{ steps.changesets.outputs.pullRequestNumber }} --auto --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
