name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"

      - run: bun install

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Create .npmrc
        run: echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > .npmrc

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "$PUBLISHED" | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            TAG="${NAME}@${VERSION}"
            DIR=$(echo "$NAME" | sed 's/@couch-kit\///')
            CHANGELOG="packages/${DIR}/CHANGELOG.md"

            # Extract version section from CHANGELOG
            if [ -f "$CHANGELOG" ]; then
              awk -v ver="$VERSION" '
                /^## / { if (found) exit; if ($2 == ver) { found=1; next } }
                found { print }
              ' "$CHANGELOG" > /tmp/release-notes.md
            fi

            # Fall back to minimal body if no changelog section found
            if [ ! -s /tmp/release-notes.md ]; then
              echo "Release ${TAG}" > /tmp/release-notes.md
            fi

            echo "Creating release: ${TAG}"
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes-file /tmp/release-notes.md \
              --verify-tag || echo "⚠️ Failed to create release for ${TAG}"

            rm -f /tmp/release-notes.md
          done

      - name: Enable auto-merge
        if: steps.changesets.outputs.pullRequestNumber
        run: gh pr merge ${{ steps.changesets.outputs.pullRequestNumber }} --auto --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Generate cross-repo token
        if: steps.changesets.outputs.published == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: faluciano
          repositories: |
            domino-party-game
            buzz-tv-party-game
            card-game-engine

      - name: Extract changelogs
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: bun run scripts/extract-changelog.ts "$PUBLISHED" > /tmp/changelog.json

      - name: Render update body
        if: steps.changesets.outputs.published == 'true'
        run: bun run scripts/render-issue.ts /tmp/changelog.json > /tmp/issue-output.txt

      - name: Dispatch consumer updates
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.cross-repo-token.outputs.token }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          CHANGELOG=$(cat /tmp/changelog.json)
          HAS_BREAKING=$(jq -r '.hasBreaking' /tmp/changelog.json)

          for REPO in domino-party-game buzz-tv-party-game card-game-engine; do
            echo "Dispatching couch-kit-update to faluciano/$REPO"
            gh api "repos/faluciano/$REPO/dispatches" \
              --method POST \
              -f event_type=couch-kit-update \
              --argjson client_payload "$(jq -n \
                --argjson packages "$PUBLISHED" \
                --argjson changelog "$CHANGELOG" \
                '{packages: $packages, changelog: $changelog}')"
          done

      - name: Create breaking-change issues
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.cross-repo-token.outputs.token }}
        run: |
          HAS_BREAKING=$(jq -r '.hasBreaking' /tmp/changelog.json)

          if [ "$HAS_BREAKING" != "true" ]; then
            echo "No breaking changes — skipping issue creation"
            exit 0
          fi

          head -n 1 /tmp/issue-output.txt > /tmp/issue-title.txt
          TITLE=$(cat /tmp/issue-title.txt)
          tail -n +3 /tmp/issue-output.txt > /tmp/issue-body.md

          HAS_SECURITY=$(jq -r '.hasSecurity' /tmp/changelog.json)

          LABELS="couch-kit-update,breaking-change"
          if [ "$HAS_SECURITY" = "true" ]; then
            LABELS="$LABELS,security"
          fi

          for REPO in domino-party-game buzz-tv-party-game card-game-engine; do
            FULL_REPO="faluciano/$REPO"

            existing=$(gh issue list --repo "$FULL_REPO" --label "couch-kit-update" --state open --json number --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              gh issue edit "$existing" \
                --repo "$FULL_REPO" \
                --title "$TITLE" \
                --add-label "$LABELS"
              gh issue comment "$existing" \
                --repo "$FULL_REPO" \
                --body-file /tmp/issue-body.md
            else
              gh issue create \
                --repo "$FULL_REPO" \
                --title "$TITLE" \
                --body-file /tmp/issue-body.md \
                --label "$LABELS" \
                --assignee "copilot"
            fi
          done
